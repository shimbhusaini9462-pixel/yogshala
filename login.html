<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yogshala Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .login-box {
      background: #fff;
      padding: 30px 35px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #f1f1f1;
    }

    img {
      width: 20px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Welcome to Yogshala</h2>
    <p>Login / Register using Google</p>

    <button id="googleLogin">
      <img src="https://developers.google.com/identity/images/g-logo.png" />
      Continue with Google
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBBgB2laofPzAnexQ4QaM6BwXijr5snMtk",
      authDomain: "yogshala-jaipur.firebaseapp.com",
      projectId: "yogshala-jaipur",
      storageBucket: "yogshala-jaipur.appspot.com",
      messagingSenderId: "903452643909",
      appId: "1:903452643909:web:a56a1cd157ebd570e6092c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("googleLogin").addEventListener("click", () => {
      signInWithPopup(auth, provider)
        .then((result) => {
          window.location.href = "index.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });
  </script>

</body>
</html>
